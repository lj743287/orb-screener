name: ORB Screen

on:
  schedule:
    - cron: '17 1 * * 2-6'
  workflow_dispatch: {}

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  screen:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Run screener
        env:
          TWELVE_DATA_KEY: ${{ secrets.TWELVE_DATA_KEY }}
          MAX_SYMBOLS: ${{ vars.MAX_SYMBOLS }}
          THROTTLE_SEC: '1.2'
        run: python screener.py
      - name: Commit CSV history
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add output
          git commit -m "screen $(date -u +%F)" || echo "no changes"
          git push || echo "push skipped"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs
      - id: deploy
        uses: actions/deploy-pages@v4
